<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <script src="https://kit.fontawesome.com/e818618146.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: silver;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 300px;
            height: 300px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .login-form {
            margin-top: 20px;
        }

        .btn-primary, .btn-primary:hover,
        .btn-secondary, .btn-secondary:hover {
            transition: background-color 0.3s;
        }

        .sns {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        .sns a {
            margin-top: 10px;
            margin-right: 20px;
        }

        .field-error {
            color: darkred;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="window" style="width: 250px; height: 255px;">
    <div class="title-bar">
        <div class="title-bar-text">LOGIN</div>
        <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
        </div>
    </div>

    <div class="window-body" style="color: black;">
        <form class="login-form" th:action="@{/login}" th:object="${form}" method="post">
            <div class="form-group">
                <input type="text" class="form-control" id="username" th:field="*{loginId}"
                       placeholder="아이디를 입력하세요" style="height: 30px; width: 230px; text-align: center; margin-bottom: 10px;">
            </div>

            <div class="form-group">
                <input type="password" class="form-control" id="password" th:field="*{password}"
                       placeholder="비밀번호를 입력하세요" style="height: 30px; width: 230px; text-align: center; margin-bottom: 5px">
            </div>

            <div th:if="${#fields.hasGlobalErrors()}">
                <p class="field-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">ERROR</p>
            </div>

            <button type="submit" style="width: 230px; height: 30px; margin-top: 10px; margin-bottom: 5px;">로그인</button>
            <button type="button" th:onclick="|location.href='@{/user/signup}'|" style="width: 230px; height: 30px; margin-top: 10px;">회원가입</button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
